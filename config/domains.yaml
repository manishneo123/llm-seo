# Domains to detect in LLM responses (your brand/sites)
tracked_domains:
  - www.spydra.app
  - www.trusys.ai

# Optional: brand names to detect in answer text (for brand_mentioned flag). If omitted, only tracked_domains are used for text match.
# brand_names:
#   - Spydra
#   - Trusys

# Niche for prompt generation (blockchain/AI or customize)
niche: "blockchain and AI"

# Pipeline limits (e.g. lower for testing)
prompt_generation:
  prompts_per_domain: 5   # prompts to generate per domain when using domain profiles
  prompt_count_total: 10  # total prompts when using single niche (no domain profiles)

monitor:
  limit: 10   # max prompts to run per monitor pass (fewer = faster for testing)
